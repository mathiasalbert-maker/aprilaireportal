// Add User Modal Component
const AddUserModal = ({ isOpen, onClose, onSave }) => {
  const [formData, setFormData] = useState({
    name: '',
    email: '',
    password: '',
    confirmPassword: '',
    role: 'Field Technician',
    status: 'Active'
  });

  const [errors, setErrors] = useState({});

  const roles = [
    { value: 'Admin', description: 'Full system access including user management' },
    { value: 'Scheduler', description: 'Schedules service appointments' },
    { value: 'Field Technician', description: 'Services devices and updates records' }
  ];

  const handleChange = (field, value) => {
    setFormData(prev => ({ ...prev, [field]: value }));
    if (errors[field]) {
      setErrors(prev => ({ ...prev, [field]: '' }));
    }
  };

  const validateForm = () => {
    const newErrors = {};

    if (!formData.name.trim()) {
      newErrors.name = 'Name is required';
    }

    if (!formData.email.trim()) {
      newErrors.email = 'Email is required';
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
      newErrors.email = 'Please enter a valid email address';
    }

    if (!formData.password) {
      newErrors.password = 'Password is required';
    } else if (formData.password.length < 8) {
      newErrors.password = 'Password must be at least 8 characters';
    }

    if (formData.password !== formData.confirmPassword) {
      newErrors.confirmPassword = 'Passwords do not match';
    }

    setErrors(newErrors);
    return Object.keys(newErrors).length === 0;
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    
    if (validateForm()) {
      const newUser = {
        id: Date.now(),
        name: formData.name,
        email: formData.email,
        role: formData.role,
        status: formData.status,
        lastLogin: 'Never'
      };
      
      onSave(newUser);
      
      setFormData({
        name: '',
        email: '',
        password: '',
        confirmPassword: '',
        role: 'Field Technician',
        status: 'Active'
      });
      setErrors({});
    }
  };

  const handleCancel = () => {
    setFormData({
      name: '',
      email: '',
      password: '',
      confirmPassword: '',
      role: 'Field Technician',
      branch: 'Corporate',
      status: 'Active'
    });
    setErrors({});
    onClose();
  };

  if (!isOpen) return null;

  return (
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div className="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between p-6 border-b border-gray-200">
          <h2 className="text-2xl font-semibold text-gray-800">Add New User</h2>
          <button
            onClick={handleCancel}
            className="text-gray-400 hover:text-gray-600 transition-colors"
          >
            <X size={24} />
          </button>
        </div>

        <form onSubmit={handleSubmit} className="p-6 space-y-6">
          <div>
            <h3 className="text-lg font-medium text-gray-800 mb-4">Personal Information</h3>
            
            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-700 mb-2">
                Full Name <span className="text-red-500">*</span>
              </label>
              <div className="relative">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <User size={20} className="text-gray-400" />
                </div>
                <input
                  type="text"
                  value={formData.name}
                  onChange={(e) => handleChange('name', e.target.value)}
                  className={`w-full pl-10 pr-4 py-2 border ${errors.name ? 'border-red-500' : 'border-gray-300'} rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500`}
                  placeholder="John Smith"
                />
              </div>
              {errors.name && (
                <p className="mt-1 text-sm text-red-500">{errors.name}</p>
              )}
            </div>

            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-700 mb-2">
                Email Address <span className="text-red-500">*</span>
              </label>
              <div className="relative">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <Mail size={20} className="text-gray-400" />
                </div>
                <input
                  type="email"
                  value={formData.email}
                  onChange={(e) => handleChange('email', e.target.value)}
                  className={`w-full pl-10 pr-4 py-2 border ${errors.email ? 'border-red-500' : 'border-gray-300'} rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500`}
                  placeholder="john.smith@abcheating.com"
                />
              </div>
              {errors.email && (
                <p className="mt-1 text-sm text-red-500">{errors.email}</p>
              )}
            </div>
          </div>

          <div>
            <h3 className="text-lg font-medium text-gray-800 mb-4">Security</h3>
            
            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-700 mb-2">
                Password <span className="text-red-500">*</span>
              </label>
              <div className="relative">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <Lock size={20} className="text-gray-400" />
                </div>
                <input
                  type="password"
                  value={formData.password}
                  onChange={(e) => handleChange('password', e.target.value)}
                  className={`w-full pl-10 pr-4 py-2 border ${errors.password ? 'border-red-500' : 'border-gray-300'} rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500`}
                  placeholder="Minimum 8 characters"
                />
              </div>
              {errors.password && (
                <p className="mt-1 text-sm text-red-500">{errors.password}</p>
              )}
            </div>

            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-700 mb-2">
                Confirm Password <span className="text-red-500">*</span>
              </label>
              <div className="relative">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <Lock size={20} className="text-gray-400" />
                </div>
                <input
                  type="password"
                  value={formData.confirmPassword}
                  onChange={(e) => handleChange('confirmPassword', e.target.value)}
                  className={`w-full pl-10 pr-4 py-2 border ${errors.confirmPassword ? 'border-red-500' : 'border-gray-300'} rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500`}
                  placeholder="Re-enter password"
                />
              </div>
              {errors.confirmPassword && (
                <p className="mt-1 text-sm text-red-500">{errors.confirmPassword}</p>
              )}
            </div>
          </div>

          <div>
            <h3 className="text-lg font-medium text-gray-800 mb-4">Access & Permissions</h3>
            
            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-700 mb-2">
                Role <span className="text-red-500">*</span>
              </label>
              <div className="relative">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <Users size={20} className="text-gray-400" />
                </div>
                <select
                  value={formData.role}
                  onChange={(e) => handleChange('role', e.target.value)}
                  className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-white"
                >
                  {roles.map(role => (
                    <option key={role.value} value={role.value}>
                      {role.value}
                    </option>
                  ))}
                </select>
              </div>
              <p className="mt-2 text-sm text-gray-600">
                {roles.find(r => r.value === formData.role)?.description}
              </p>
            </div>

            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-700 mb-2">
                Account Status
              </label>
              <div className="flex items-center space-x-4">
                <label className="flex items-center">
                  <input
                    type="radio"
                    value="Active"
                    checked={formData.status === 'Active'}
                    onChange={(e) => handleChange('status', e.target.value)}
                    className="mr-2"
                  />
                  <span className="text-sm text-gray-700">Active</span>
                </label>
                <label className="flex items-center">
                  <input
                    type="radio"
                    value="Inactive"
                    checked={formData.status === 'Inactive'}
                    onChange={(e) => handleChange('status', e.target.value)}
                    className="mr-2"
                  />
                  <span className="text-sm text-gray-700">Inactive</span>
                </label>
              </div>
            </div>
          </div>

          <div className="flex justify-end space-x-3 pt-4 border-t border-gray-200">
            <button
              type="button"
              onClick={handleCancel}
              className="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors"
            >
              Cancel
            </button>
            <button
              type="submit"
              className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
            >
              Create User
            </button>
          </div>
        </form>
      </div>
    </div>
  );
};

// Add Branch Modal Component
const AddBranchModal = ({ isOpen, onClose, onSave, users }) => {

    city: '',
    state: '',
    zip: '',
    manager: '-'

  const [errors, setErrors] = useState({});

  const handleChange = (field, value) => {
    setFormData(prev => ({ ...prev, [field]: value }));
    if (errors[field]) {
      setErrors(prev => ({ ...prev, [field]: '' }));
    }
  };

  const validateForm = () => {
    const newErrors = {};

    if (!formData.name.trim()) {
      newErrors.name = 'Branch name is required';
    }

    if (!formData.address.trim()) {
      newErrors.address = 'Street address is required';
    }

    if (!formData.city.trim()) {
      newErrors.city = 'City is required';
    }

    if (!formData.state.trim()) {
      newErrors.state = 'State is required';
    }

    if (!formData.zip.trim()) {
      newErrors.zip = 'ZIP code is required';
    } else if (!/^\d{5}$/.test(formData.zip)) {
      newErrors.zip = 'ZIP code must be 5 digits';
    }

    setErrors(newErrors);
    return Object.keys(newErrors).length === 0;

                <input

              className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"

              Create Branch
            </button>

                          setEditingCompany(true);
                          setTempCompanyInfo({});
                        }}
                        className="px-4 py-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"
                      >
                        Edit
                      </button>
                    ) : (
                      <div className="space-x-2">
                        <button 
                          onClick={() => setEditingCompany(false)}
                          className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors"
                        >
                          Cancel
                        </button>
                        <button 
                          onClick={handleSaveCompanyInfo}
                          className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                        >
                          Save
                        </button>
                      </div>
                    )}
                  </div>

                  <div className="space-y-6">
                    <div className="bg-gray-50 p-6 rounded-lg">
                      <h3 className="font-semibold text-gray-800 mb-4">Company Logo</h3>
                      <div className="flex items-center space-x-4">
                        <div className="w-24 h-24 bg-blue-600 rounded-lg flex items-center justify-center">
                          <svg className="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                          </svg>
                        </div>
                        <button className="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                          Upload New Logo
                        </button>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-6">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">Company Name</label>
                        {editingCompany ? (
                          <input 
                            type="text"
                            value={tempCompanyInfo.name !== undefined ? tempCompanyInfo.name : companyInfo.name}
                            onChange={(e) => setTempCompanyInfo({...tempCompanyInfo, name: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                          />
                        ) : (
                          <p className="text-gray-900">{companyInfo.name}</p>
                        )}
                      </div>
                      
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">Phone</label>
                        {editingCompany ? (
                          <input 
                            type="text"
                            value={tempCompanyInfo.phone !== undefined ? tempCompanyInfo.phone : companyInfo.phone}
                            onChange={(e) => setTempCompanyInfo({...tempCompanyInfo, phone: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                          />
                        ) : (
                          <p className="text-gray-900">{companyInfo.phone}</p>
                        )}
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        {editingCompany ? (
                          <input 
                            type="email"
                            value={tempCompanyInfo.email !== undefined ? tempCompanyInfo.email : companyInfo.email}
                            onChange={(e) => setTempCompanyInfo({...tempCompanyInfo, email: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                          />
                        ) : (
                          <p className="text-gray-900">{companyInfo.email}</p>
                        )}
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">Website</label>
                        {editingCompany ? (
                          <input 
                            type="text"
                            value={tempCompanyInfo.website !== undefined ? tempCompanyInfo.website : companyInfo.website}
                            onChange={(e) => setTempCompanyInfo({...tempCompanyInfo, website: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                          />
                        ) : (
                          <p className="text-gray-900">{companyInfo.website}</p>
                        )}
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">Street Address</label>
                        {editingCompany ? (
                          <input 
                            type="text"
                            value={tempCompanyInfo.address !== undefined ? tempCompanyInfo.address : companyInfo.address}
                            onChange={(e) => setTempCompanyInfo({...tempCompanyInfo, address: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                          />
                        ) : (
                          <p className="text-gray-900">{companyInfo.address}</p>
                        )}
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">City</label>
                        {editingCompany ? (
                          <input 
                            type="text"
                            value={tempCompanyInfo.city !== undefined ? tempCompanyInfo.city : companyInfo.city}
                            onChange={(e) => setTempCompanyInfo({...tempCompanyInfo, city: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                          />
                        ) : (
                          <p className="text-gray-900">{companyInfo.city}</p>
                        )}
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">State</label>
                        {editingCompany ? (
                          <input 
                            type="text"
                            value={tempCompanyInfo.state !== undefined ? tempCompanyInfo.state : companyInfo.state}
                            onChange={(e) => setTempCompanyInfo({...tempCompanyInfo, state: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                          />
                        ) : (
                          <p className="text-gray-900">{companyInfo.state}</p>
                        )}
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">ZIP Code</label>
                        {editingCompany ? (
                          <input 
                            type="text"
                            value={tempCompanyInfo.zip !== undefined ? tempCompanyInfo.zip : companyInfo.zip}
                            onChange={(e) => setTempCompanyInfo({...tempCompanyInfo, zip: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                          />
                        ) : (
                          <p className="text-gray-900">{companyInfo.zip}</p>
                        )}
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-2">
                        Service Radius: {companyInfo.serviceRadius} miles
                      </label>
                      <input 
                        type="range" 
                        min="10" 
                        max="200" 
                        value={companyInfo.serviceRadius}
                        onChange={(e) => setCompanyInfo({...companyInfo, serviceRadius: parseInt(e.target.value)})}
                        className="w-full"
                        disabled={!editingCompany}
                      />
                    </div>
                  </div>
                </div>
              )}

              {settingsTab === 'devices' && (
                <div>
                  <div className="flex justify-between items-center mb-6">
                    <div>
                      <h2 className="text-xl font-semibold text-gray-800">Device Management</h2>
                      <p className="text-sm text-gray-600 mt-1">Register new Aprilaire dehumidifiers for your customers</p>
                    </div>
                    <button 
                      onClick={() => setShowAddDeviceModal(true)}
                      className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                    >
                      Add Device
                    </button>
                  </div>

                  <div className="bg-white border border-gray-200 rounded-lg p-6">
                    <h3 className="font-semibold text-gray-800 mb-3">How to Register a New Device</h3>
                    <ol className="space-y-3 text-sm text-gray-700">
                      <li className="flex items-start">
                        <span className="flex-shrink-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-xs mr-3 mt-0.5">1</span>
                        <div>
                          <p className="font-medium">Complete Installation</p>
                          <p className="text-gray-600 mt-1">Install the Aprilaire dehumidifier at the customer's location and ensure it's connected to WiFi.</p>
                        </div>
                      </li>
                      <li className="flex items-start">
                        <span className="flex-shrink-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-xs mr-3 mt-0.5">2</span>
                        <div>
                          <p className="font-medium">Locate Device Information</p>
                          <p className="text-gray-600 mt-1">Find the MAC ID (12-character serial number) on the device label. This is typically located on the side or back of the unit.</p>
                        </div>
                      </li>
                      <li className="flex items-start">
                        <span className="flex-shrink-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-xs mr-3 mt-0.5">3</span>
                        <div>
                          <p className="font-medium">Register Device</p>
                          <p className="text-gray-600 mt-1">Click the "Add Device" button above and enter the customer information, device model, and MAC ID.</p>
                        </div>
                      </li>
                      <li className="flex items-start">
                        <span className="flex-shrink-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-xs mr-3 mt-0.5">4</span>
                        <div>
                          <p className="font-medium">Configure Settings</p>
                          <p className="text-gray-600 mt-1">Set the initial humidity setpoint and assign the device to the appropriate branch for your organization.</p>
                        </div>
                      </li>
                      <li className="flex items-start">
                        <span className="flex-shrink-0 w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-xs mr-3 mt-0.5">5</span>
                        <div>
                          <p className="font-medium">Monitor & Maintain</p>
                          <p className="text-gray-600 mt-1">Once registered, the device will appear in your Fleet Dashboard where you can monitor its status and make adjustments remotely.</p>
                        </div>
                      </li>
                    </ol>
                  </div>

                  <div className="bg-yellow-50 border-l-4 border-yellow-500 p-4 rounded mt-6">
                    <h3 className="font-semibold text-yellow-900 mb-2">Important Notes</h3>
                    <ul className="space-y-1 text-sm text-yellow-800">
                      <li>• Each MAC ID can only be registered once in the system</li>
                      <li>• Ensure the device is powered on and connected to WiFi before registering</li>
                      <li>• Customer will need to download the Aprilaire Healthy Air App to see your company information</li>
                      <li>• You can edit device information and settings anytime from the Fleet Dashboard</li>
                    </ul>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>

        <AddUserModal 
          isOpen={showAddUserModal}
          onClose={() => setShowAddUserModal(false)}
          onSave={handleAddUser}
        />

        <AddDeviceModal 
          isOpen={showAddDeviceModal}
          onClose={() => setShowAddDeviceModal(false)}
          onSave={handleAddDevice}
        />
      </div>
    );
  }

  return null;
};

// Render the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AprilaireProPortal />);
    </script>
</body>
</html>
